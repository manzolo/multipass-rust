name: CI
on:
  push:
  pull_request:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Bash syntax check
        run: |
          found=0
          while IFS= read -r f; do
            found=1
            echo "== bash -n $f"
            bash -n "$f"
          done < <(find . -path ./.git -prune -o -name '*.sh' -type f -print)
          [ "$found" -eq 1 ] || echo "No shell scripts found to check"
      - name: ShellCheck (advisory)
        continue-on-error: true
        run: |
          find . -path ./.git -prune -o -name '*.sh' -type f -print0 \
            | xargs -0 -r shellcheck --severity=warning
